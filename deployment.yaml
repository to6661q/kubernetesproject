apiVersion: apps/v1
kind: Deployment
metadata:
  name: loxury-web-deployment
  labels:
    app: loxury-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loxury-web
  template:
    metadata:
      labels:
        app: loxury-web
    spec:
      containers:
        - name: loxury-web
          image: toriqnain/loxury-web:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
